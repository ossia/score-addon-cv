name: Build

on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Build in/against ossia score: dev tree, SDK, JIT artifact and release tracks.
  # This addon ships a release.sh, so the release job stays enabled (do NOT pass
  # release: false).
  score:
    uses: ossia/actions/.github/workflows/score-addon.yml@master
    secrets: inherit

  # Build the same objects standalone, one artifact per back-end. The texture-category
  # CV objects produce the texture/video back-ends (ossia/max/gstreamer/td/godot/python);
  # the pure-data objects (readbacks, Kalman, homography, ...) build as plain objects.
  standalone:
    uses: ossia/actions/.github/workflows/avnd-addon.yml@master
    secrets: inherit
    with:
      # Texture / video back-ends:
      max: true
      gstreamer: true
      touchdesigner: true
      godot: true
      python: true
